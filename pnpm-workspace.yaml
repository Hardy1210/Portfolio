# requerido por pnpm 9 (Vercel): sin este campo falla con "packages field missing or empty"
# no es un monorepo, el unico paquete es la raiz
packages:
  - '.'

# fuerza la version parcheada de la dependencia transitiva de @swc/cli
# (GHSA-mp2f-45pm-3cg9, extraccion de archivos fuera del directorio destino)
overrides:
  '@xhmikosr/decompress': '>=10.2.1'

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  '@vercel/speed-insights': true
  esbuild: true
  prisma: true
  sharp: true
